<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8afb"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="248" height="248" rx="40" ry="40" fill="url(#bg)" stroke="#7c6bf5" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Grid of 4 terminal windows -->
  <!-- Top-left terminal -->
  <g transform="translate(28, 28)">
    <rect width="92" height="82" rx="8" ry="8" fill="url(#termBg)" stroke="#7c6bf5" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Title bar -->
    <rect width="92" height="16" rx="8" ry="0" fill="#7c6bf5" fill-opacity="0.15"/>
    <rect x="0" y="8" width="92" height="8" fill="#7c6bf5" fill-opacity="0.15"/>
    <!-- Window dots -->
    <circle cx="12" cy="8" r="2.5" fill="#ff5f56" opacity="0.8"/>
    <circle cx="22" cy="8" r="2.5" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="32" cy="8" r="2.5" fill="#27c93f" opacity="0.8"/>
    <!-- Terminal lines -->
    <text x="8" y="33" font-family="monospace" font-size="9" fill="#7c6bf5" opacity="0.9">$_</text>
    <rect x="8" y="40" width="50" height="2.5" rx="1" fill="#7c6bf5" opacity="0.3"/>
    <rect x="8" y="48" width="35" height="2.5" rx="1" fill="#7c6bf5" opacity="0.2"/>
    <rect x="8" y="56" width="60" height="2.5" rx="1" fill="#9b8afb" opacity="0.25"/>
    <rect x="8" y="64" width="42" height="2.5" rx="1" fill="#7c6bf5" opacity="0.15"/>
  </g>

  <!-- Top-right terminal -->
  <g transform="translate(136, 28)">
    <rect width="92" height="82" rx="8" ry="8" fill="url(#termBg)" stroke="#7c6bf5" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect width="92" height="16" rx="8" ry="0" fill="#7c6bf5" fill-opacity="0.15"/>
    <rect x="0" y="8" width="92" height="8" fill="#7c6bf5" fill-opacity="0.15"/>
    <circle cx="12" cy="8" r="2.5" fill="#ff5f56" opacity="0.8"/>
    <circle cx="22" cy="8" r="2.5" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="32" cy="8" r="2.5" fill="#27c93f" opacity="0.8"/>
    <text x="8" y="33" font-family="monospace" font-size="9" fill="#9b8afb" opacity="0.9">$_</text>
    <rect x="8" y="40" width="40" height="2.5" rx="1" fill="#9b8afb" opacity="0.35"/>
    <rect x="8" y="48" width="55" height="2.5" rx="1" fill="#7c6bf5" opacity="0.25"/>
    <rect x="8" y="56" width="30" height="2.5" rx="1" fill="#7c6bf5" opacity="0.2"/>
    <rect x="8" y="64" width="48" height="2.5" rx="1" fill="#9b8afb" opacity="0.2"/>
  </g>

  <!-- Bottom-left terminal -->
  <g transform="translate(28, 146)">
    <rect width="92" height="82" rx="8" ry="8" fill="url(#termBg)" stroke="#7c6bf5" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect width="92" height="16" rx="8" ry="0" fill="#7c6bf5" fill-opacity="0.15"/>
    <rect x="0" y="8" width="92" height="8" fill="#7c6bf5" fill-opacity="0.15"/>
    <circle cx="12" cy="8" r="2.5" fill="#ff5f56" opacity="0.8"/>
    <circle cx="22" cy="8" r="2.5" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="32" cy="8" r="2.5" fill="#27c93f" opacity="0.8"/>
    <text x="8" y="33" font-family="monospace" font-size="9" fill="#7c6bf5" opacity="0.9">$_</text>
    <rect x="8" y="40" width="45" height="2.5" rx="1" fill="#7c6bf5" opacity="0.25"/>
    <rect x="8" y="48" width="65" height="2.5" rx="1" fill="#9b8afb" opacity="0.3"/>
    <rect x="8" y="56" width="38" height="2.5" rx="1" fill="#7c6bf5" opacity="0.2"/>
    <rect x="8" y="64" width="52" height="2.5" rx="1" fill="#7c6bf5" opacity="0.15"/>
  </g>

  <!-- Bottom-right terminal -->
  <g transform="translate(136, 146)">
    <rect width="92" height="82" rx="8" ry="8" fill="url(#termBg)" stroke="#7c6bf5" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect width="92" height="16" rx="8" ry="0" fill="#7c6bf5" fill-opacity="0.15"/>
    <rect x="0" y="8" width="92" height="8" fill="#7c6bf5" fill-opacity="0.15"/>
    <circle cx="12" cy="8" r="2.5" fill="#ff5f56" opacity="0.8"/>
    <circle cx="22" cy="8" r="2.5" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="32" cy="8" r="2.5" fill="#27c93f" opacity="0.8"/>
    <text x="8" y="33" font-family="monospace" font-size="9" fill="#9b8afb" opacity="0.9">$_</text>
    <rect x="8" y="40" width="55" height="2.5" rx="1" fill="#9b8afb" opacity="0.3"/>
    <rect x="8" y="48" width="42" height="2.5" rx="1" fill="#7c6bf5" opacity="0.2"/>
    <rect x="8" y="56" width="58" height="2.5" rx="1" fill="#7c6bf5" opacity="0.25"/>
    <rect x="8" y="64" width="35" height="2.5" rx="1" fill="#9b8afb" opacity="0.2"/>
  </g>

  <!-- Center connection glow -->
  <circle cx="128" cy="128" r="12" fill="#7c6bf5" opacity="0.08"/>
  <circle cx="128" cy="128" r="6" fill="#7c6bf5" opacity="0.12"/>
</svg>
